aid: sorry
name: Sorry
description: >-
  Sorry™ (SorryApp) is a status page platform that enables teams to communicate
  planned and unplanned service interruptions to their customers. The Sorry REST
  API provides full programmatic control over status pages, components, incident
  notices, notice updates, and subscriber management. Build automated incident
  communication workflows that integrate with monitoring tools, alerting platforms,
  and customer notification systems.
